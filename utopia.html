<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>utopia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Inter:wght@400;500&display=swap');

html, body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background-color: #1a2636;
}
body {
  font-family: 'Inter', Arial, sans-serif;
  color: #fbfcfe;
}

.section {
  position: fixed;
  left: 0;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08), transparent 60%),
    linear-gradient(150deg, #2b4c6f 0%, #3a5d82 35%, #1d334a 70%, #112031 100%);
}

.poetry-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 24px;
}

.eyebrow {
  display: block;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.45);
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
  animation-delay: 0.2s;
}

.poetry-title {
  font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
  font-weight: 300;
  font-size: 38px;
  line-height: 1.8;
  color: #ffffff;
  letter-spacing: 12px;
  text-indent: 12px; 
  text-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
  margin: 0;
  opacity: 0;
  animation: fadeUp 1.2s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
  animation-delay: 0.5s;
}

.poetry-title span {
  display: block;
}

.divider {
  width: 1px;
  height: 60px;
  background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.35), transparent);
  margin: 36px 0;
  opacity: 0;
  animation: fadeUp 1.2s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
  animation-delay: 0.8s;
}

.back-wrap {
  position: fixed;
  top: 28px;
  left: 28px;
  opacity: 0;
  animation: fadeIn 1s ease forwards;
  animation-delay: 1.2s;
  z-index: 10;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: rgba(255, 255, 255, 0.7);
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
  text-decoration: none;
  border-radius: 30px;
  transition: all 0.3s ease;
}
.back-btn:hover {
  color: #ffffff;
  background: rgba(255, 255, 255, 0.12);
  border-color: rgba(255, 255, 255, 0.45);
  transform: translateX(-2px);
}
.back-btn svg {
  width: 16px;
  height: 16px;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 480px) {
  .poetry-title { 
    font-size: 28px; 
    letter-spacing: 8px;
    text-indent: 8px;
  }
  .divider { height: 45px; margin: 28px 0; }
  .back-wrap { top: 20px; left: 20px; }
  .back-btn { padding: 8px 16px; font-size: 12px; }
}

@media (prefers-reduced-motion: reduce){
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="back-wrap">
  <a href="index.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    返回
  </a>
</div>

<div class="section">
  <div class="poetry-card">
    <span class="eyebrow">UTOPIA IS COMING</span>
    
    <h1 class="poetry-title">
      <span>嘤其鸣矣</span>
      <div class="divider"></div>
      <span>共建桃源</span>
    </h1>
    
  </div>
</div>

</body>
</html>
