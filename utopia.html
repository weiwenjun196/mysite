<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>utopia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Inter:wght@300;400;500&display=swap');
html, body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background-color: #0d1620;
}
body {
  font-family: 'Inter', Arial, sans-serif;
  color: #fbfcfe;
}
.section {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
  background:
    radial-gradient(ellipse 70% 50% at 50% 38%, rgba(212,180,131,0.05), transparent 65%),
    linear-gradient(180deg, #0e1924 0%, #16263a 30%, #213a52 55%, #16263a 78%, #0a131c 100%);
}

.atmosphere {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}
.stars {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  animation: starsIn 3s ease forwards;
  animation-delay: 0.1s;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: #e8eef5;
  animation: twinkle 4s ease-in-out infinite;
}
.moon-glow {
  position: absolute;
  top: 8%;
  left: 50%;
  width: 420px;
  height: 420px;
  margin-left: -210px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(225,219,196,0.16) 0%, rgba(212,180,131,0.06) 45%, transparent 75%);
  opacity: 0;
  animation: fadeInSlow 3.5s ease forwards;
  animation-delay: 0.3s;
}
.ridge {
  position: absolute;
  bottom: 0;
  left: -5%;
  width: 110%;
  opacity: 0;
  animation: fadeInSlow 2.8s ease forwards;
}
.ridge-far {
  animation-delay: 0.5s;
  filter: blur(0.3px);
}
.ridge-mid {
  animation-delay: 0.8s;
}
.ridge-near {
  animation-delay: 1.1s;
}
.mist-band {
  position: absolute;
  left: -10%;
  width: 120%;
  height: 140px;
  background: linear-gradient(180deg, transparent, rgba(199,212,214,0.07), transparent);
  opacity: 0;
  filter: blur(8px);
}
.mist-1 {
  bottom: 8%;
  animation: driftRight 28s ease-in-out infinite, fadeInSlow 3s ease forwards;
  animation-delay: 0s, 1.4s;
}
.mist-2 {
  bottom: 18%;
  height: 100px;
  animation: driftLeft 34s ease-in-out infinite, fadeInSlow 3s ease forwards;
  animation-delay: 0s, 1.7s;
}
.firefly {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: #e3cf9a;
  box-shadow: 0 0 6px 1px rgba(227,207,154,0.7);
  opacity: 0;
  animation: firefly 7s ease-in-out infinite;
}

.poetry-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 24px;
  position: relative;
  z-index: 2;
}
.eyebrow {
  display: block;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(225, 219, 196, 0.5);
  margin-bottom: 40px;
  opacity: 0;
  animation: fadeUp 1.2s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
  animation-delay: 0.6s;
}
.poetry-title {
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.line-1 {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-weight: 300;
  font-size: 32px;
  line-height: 1.6;
  color: rgba(251, 252, 254, 0.78);
  letter-spacing: 10px;
  text-indent: 10px;
  margin: 0;
  opacity: 0;
  animation: fadeUp 1.3s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
  animation-delay: 0.9s;
}
.divider {
  width: 1px;
  height: 46px;
  background: linear-gradient(to bottom, transparent, rgba(212,180,131,0.5), transparent);
  margin: 26px 0;
  opacity: 0;
  animation: fadeUp 1.3s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
  animation-delay: 1.3s;
}
.line-2 {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-weight: 400;
  font-size: 44px;
  line-height: 1.6;
  color: #ffffff;
  letter-spacing: 14px;
  text-indent: 14px;
  text-shadow: 0 4px 30px rgba(212,180,131,0.18);
  margin: 0;
  opacity: 0;
  animation: fadeUp 1.4s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
  animation-delay: 1.6s;
}

.back-wrap {
  position: fixed;
  top: 28px;
  left: 28px;
  opacity: 0;
  animation: fadeIn 1s ease forwards;
  animation-delay: 2.2s;
  z-index: 10;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: rgba(255, 255, 255, 0.6);
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.16);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
  text-decoration: none;
  border-radius: 30px;
  transition: all 0.3s ease;
}
.back-btn:hover {
  color: #ffffff;
  background: rgba(255, 255, 255, 0.10);
  border-color: rgba(255, 255, 255, 0.38);
  transform: translateX(-2px);
}
.back-btn svg {
  width: 16px;
  height: 16px;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes fadeInSlow {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes twinkle {
  0%, 100% { opacity: 0.25; }
  50% { opacity: 0.85; }
}
@keyframes starsIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes driftRight {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(4%); }
}
@keyframes driftLeft {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(-4%); }
}
@keyframes firefly {
  0%, 100% { opacity: 0; transform: translate(0, 0); }
  15% { opacity: 0.9; }
  50% { opacity: 0.4; transform: translate(14px, -18px); }
  85% { opacity: 0.8; }
}

@media (max-width: 480px) {
  .line-1 { font-size: 24px; letter-spacing: 7px; text-indent: 7px; }
  .line-2 { font-size: 32px; letter-spacing: 9px; text-indent: 9px; }
  .divider { height: 36px; margin: 20px 0; }
  .eyebrow { margin-bottom: 30px; font-size: 10px; letter-spacing: 3px; }
  .back-wrap { top: 20px; left: 20px; }
  .back-btn { padding: 8px 16px; font-size: 12px; }
  .moon-glow { width: 280px; height: 280px; margin-left: -140px; }
}
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="back-wrap">
  <a href="index.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    返回
  </a>
</div>

<div class="section">
  <div class="atmosphere">
    <div class="moon-glow"></div>
    <div class="stars" id="stars"></div>

    <svg class="ridge ridge-far" viewBox="0 0 1440 400" preserveAspectRatio="none" style="height:48vh;">
      <path d="M0,260 L120,170 L260,230 L420,100 L600,190 L760,60 L940,200 L1120,130 L1280,220 L1440,160 L1440,400 L0,400 Z" fill="#1c3046" opacity="0.5"/>
    </svg>
    <svg class="ridge ridge-mid" viewBox="0 0 1440 360" preserveAspectRatio="none" style="height:38vh;">
      <path d="M0,290 L160,190 L340,260 L520,130 L700,230 L880,150 L1060,250 L1240,170 L1440,260 L1440,360 L0,360 Z" fill="#172838" opacity="0.72"/>
    </svg>
    <svg class="ridge ridge-near" viewBox="0 0 1440 280" preserveAspectRatio="none" style="height:26vh;">
      <path d="M0,230 L200,140 L420,210 L640,110 L860,200 L1080,150 L1280,215 L1440,180 L1440,280 L0,280 Z" fill="#0e1a26"/>
    </svg>

    <div class="mist-band mist-1"></div>
    <div class="mist-band mist-2"></div>

    <div class="firefly" style="left:22%; bottom:30%; animation-delay:0.5s;"></div>
    <div class="firefly" style="left:68%; bottom:38%; animation-delay:2.1s;"></div>
    <div class="firefly" style="left:45%; bottom:25%; animation-delay:3.8s;"></div>
    <div class="firefly" style="left:80%; bottom:46%; animation-delay:1.3s;"></div>
    <div class="firefly" style="left:14%; bottom:48%; animation-delay:5s;"></div>
  </div>

  <div class="poetry-card">
    <span class="eyebrow">utopia is coming</span>
    <h1 class="poetry-title">
      <span class="line-1">嘤其鸣矣</span>
      <div class="divider"></div>
      <span class="line-2">共建桃源</span>
    </h1>
  </div>
</div>

<script>
const starsEl = document.getElementById('stars');
const starCount = 70;
let starsHTML = '';
for (let i = 0; i < starCount; i++) {
  const x = Math.random() * 100;
  const y = Math.random() * 55;
  const size = Math.random() * 1.6 + 0.6;
  const delay = (Math.random() * 4).toFixed(2);
  const duration = (Math.random() * 3 + 3).toFixed(2);
  starsHTML += `<div class="star" style="left:${x}%; top:${y}%; width:${size}px; height:${size}px; animation-delay:${delay}s; animation-duration:${duration}s;"></div>`;
}
starsEl.innerHTML = starsHTML;
</script>
</body>
</html>
