<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Administrator - Chat (Firestore)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; display:flex; flex-direction:column; height:100vh }
    header { background:#ff7f50; color:white; padding:12px 16px }
    main { flex:1; display:flex; flex-direction:column; padding:12px }
    #messages { flex:1; border:1px solid #ddd; padding:8px; overflow:auto; background:#f9f9f9 }
    .msg { margin:6px 0; }
    .msg.me { text-align:right }
    .msg .meta { font-size:12px; color:#666 }
    .msg .text { display:inline-block; padding:8px 10px; border-radius:10px; max-width:70%; }
    .msg.me .text { background:#ffdebe }
    .msg.them .text { background:#eee }
    form { display:flex; gap:8px; margin-top:8px }
    input[type=text] { flex:1; padding:8px; font-size:14px }
    button { padding:8px 12px; font-size:14px }
    .note { font-size:12px; color:#444; margin-top:8px }
  </style>
</head>
<body>
  <header>
    <h1>Administrator - 聊天（使用 Firestore）</h1>
  </header>
  <main>
    <div id="messages" aria-live="polite"></div>

    <form id="chatForm">
      <input id="input" type="text" placeholder="输入消息并回车或点击发送" autocomplete="off" />
      <button type="submit">发送</button>
    </form>
    <div class="note">说明：此页面使用 Firebase Firestore 实现实时聊天。请在下面脚本中填写你的 Firebase 配置并在 Firebase Console 中启用 Firestore。</div>
  </main>

  <script type="module">
    // --- 配置 ---
    // 在 Firebase 控制台创建项目并启用 Firestore，然后把下面的 firebaseConfig 替换为你项目的配置。
    const firebaseConfig = {
      apiKey: "REPLACE_WITH_YOUR_API_KEY",
      authDomain: "REPLACE_WITH_YOUR_AUTH_DOMAIN",
      projectId: "REPLACE_WITH_YOUR_PROJECT_ID",
      // storageBucket, messagingSenderId, appId 可选
    };

    // 用户身份（固定为 administrator）
    const USER = 'administrator';
    // 聊天房间 ID（bob 和 administrator 需使用相同 room）
    const ROOM = 'bob_administrator_room';

    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const msgsCol = collection(db, 'messages');

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const form = document.getElementById('chatForm');

    function render(msgs){
      messagesEl.innerHTML = '';
      msgs.forEach(m => {
        const div = document.createElement('div');
        div.className = 'msg ' + (m.user === USER ? 'me' : 'them');
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = m.user + ' · ' + (m.createdAt ? new Date(m.createdAt.toMillis()).toLocaleString() : '...');
        const text = document.createElement('div');
        text.className = 'text';
        text.textContent = m.text;
        div.appendChild(meta);
        div.appendChild(text);
        messagesEl.appendChild(div);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // 监听消息（按 createdAt 排序）并过滤当前 ROOM
    const q = query(msgsCol, orderBy('createdAt'));
    onSnapshot(q, (snapshot) => {
      const msgs = snapshot.docs
        .map(doc => ({ id: doc.id, ...doc.data() }))
        .filter(m => m.room === ROOM);
      render(msgs);
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if(!text) return;
      try{
        await addDoc(msgsCol, { room: ROOM, user: USER, text, createdAt: serverTimestamp() });
        inputEl.value = '';
      }catch(err){
        console.error('发送消息失败', err);
        alert('发送失败，请查看控制台');
      }
    });
  </script>

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);

  </script>
</body>
</html>
