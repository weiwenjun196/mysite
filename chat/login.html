<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
html, body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:Arial;
}

/* 背景 */
body{
  background:linear-gradient(135deg,#90caf8,#64b5f6);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 登录卡片 */
.login-box{
  width:360px;
  padding:40px;
  background:white;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

h2{
  margin-bottom:20px;
  color:#333;
}

/* 输入框 */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
}

/* ===== 按钮并列区域 ===== */
.btn-row{
  display:flex;
  gap:12px;
  margin-top:18px;
}

/* Login按钮 */
button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#64b5f6;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
}

/* 返回主页按钮 */
.back-btn{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;

  padding:14px;
  background:#90caf8;
  color:white;
  text-decoration:none;
  font-size:16px;

  border-radius:8px;
  transition:0.2s;
}

.back-btn:hover{
  transform:scale(1.03);
}

button:active,
.back-btn:active{
  transform:scale(0.97);
}

.small{
  margin-top:12px;
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <!-- 并列按钮 -->
  <div class="btn-row">
    <button onclick="login()">Login</button>
    <a href="../index.html" class="back-btn">返回主页</a>
  </div>

  <div class="small">Demo: bob / 234789</div>
</div>

<script>
function login(){
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;

  const users = { bob: "234789" };

  if(!u || !p){
    alert("请输入用户名和密码");
    return;
  }

  if(users[u] && users[u] === p){
    window.location.href = "bob.html";
    return;
  }

  alert("用户名或密码错误");
}
</script>

</body>
</html>
