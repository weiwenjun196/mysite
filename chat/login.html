<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>聊天室</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100vh; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg,#90caf8,#64b5f6);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 85vh;
  }
  .header {
    background: #64b5f6;
    color: white;
    padding: 14px 16px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header .status { font-size: 12px; opacity: 0.85; font-weight: normal; }
  .logout-btn {
    background: rgba(255,255,255,0.25);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.4); }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg-row { display: flex; flex-direction: column; max-width: 75%; position: relative; }
  .msg-row.mine { align-self: flex-end; align-items: flex-end; }
  .msg-row.theirs { align-self: flex-start; align-items: flex-start; }
  .msg-name { font-size: 12px; color: #888; margin-bottom: 2px; padding: 0 4px; }

  .bubble-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .msg-row.mine .bubble-wrap { flex-direction: row; }
  .msg-row.theirs .bubble-wrap { flex-direction: row-reverse; }

  .bubble {
    padding: 8px 12px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
    user-select: none;
    -webkit-user-select: none;
  }
  .mine .bubble { background: #64b5f6; color: white; border-bottom-right-radius: 4px; }
  .theirs .bubble { background: #f0f0f0; color: #222; border-bottom-left-radius: 4px; }

  .bubble.pressed { filter: brightness(0.92); }

  .recalled-msg {
    font-size: 13px;
    color: #999;
    font-style: italic;
    padding: 6px 4px;
  }

  .context-menu {
    position: fixed;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    padding: 6px;
    z-index: 1000;
    display: none;
    min-width: 110px;
  }
  .context-menu.active { display: block; }
  .context-menu button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 10px 14px;
    font-size: 14px;
    border-radius: 6px;
    cursor: pointer;
    color: #333;
  }
  .context-menu button:hover { background: #f5f5f5; }
  .context-menu button.danger { color: #e53935; }

  .input-bar {
    display: flex;
    padding: 12px;
    border-top: 1px solid #eee;
    gap: 8px;
  }
  .input-bar input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 20px;
    font-size: 14px;
    outline: none;
  }
  .input-bar button {
    background: #64b5f6;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 0 18px;
    cursor: pointer;
    font-size: 14px;
  }
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #888;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <span id="headerTitle">聊天室</span>
    <div style="display:flex; align-items:center; gap:10px;">
      <span class="status" id="statusText"></span>
      <button class="logout-btn" id="clearAllBtn">清空记录</button>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </div>
  <div id="loadingScreen" class="loading-screen">加载中...</div>
  <div class="messages" id="messages" style="display:none;"></div>
  <div class="input-bar" id="inputBar" style="display:none;">
    <input type="text" id="msgInput" placeholder="输入消息..." />
    <button id="sendBtn">发送</button>
  </div>
</div>

<div class="context-menu" id="contextMenu">
  <button class="danger" id="recallMenuItem">撤回</button>
  <button class="danger" id="deleteMenuItem">删除</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  const CHAT_PAIR = ["bob", "admin"];

  const RECALL_TIME_LIMIT_MS = 2 * 60 * 1000;

  const messagesEl = document.getElementById('messages');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const loadingScreen = document.getElementById('loadingScreen');
  const inputBar = document.getElementById('inputBar');
  const headerTitle = document.getElementById('headerTitle');
  const statusText = document.getElementById('statusText');
  const contextMenu = document.getElementById('contextMenu');
  const recallMenuItem = document.getElementById('recallMenuItem');
  const deleteMenuItem = document.getElementById('deleteMenuItem');
  const clearAllBtn = document.getElementById('clearAllBtn');

  let myUsername = '';
  let otherUsername = '';
  let chatRoomId = '';
  let activeMessageId = null;

  let longPressTimer = null;
  const LONG_PRESS_DURATION = 450;

  const messageRowMap = new Map();
  const messageDataMap = new Map(); // messageId -> 原始消息内容，清空记录时需要遍历用
  const hiddenIds = new Set(); // 我自己隐藏（删除/清空）了哪些消息id，本地缓存一份方便快速判断

  auth.onAuthStateChanged((user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    myUsername = user.email.split('@')[0];

    if (!CHAT_PAIR.includes(myUsername)) {
      loadingScreen.textContent = "当前账号未配置聊天权限";
      return;
    }

    otherUsername = CHAT_PAIR.find(name => name !== myUsername);
    headerTitle.textContent = `与 ${otherUsername} 聊天中`;
    statusText.textContent = `我是 ${myUsername}`;

    chatRoomId = CHAT_PAIR.slice().sort().join('_');

    loadingScreen.style.display = 'none';
    messagesEl.style.display = 'flex';
    inputBar.style.display = 'flex';
    msgInput.focus();

    listenForMessages();
  });

  function logout() {
    auth.signOut().then(() => {
      window.location.href = "login.html";
    });
  }

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !chatRoomId) return;
    db.ref(`chats/${chatRoomId}/messages`).push({
      from: myUsername,
      text: text,
      recalled: false,
      time: firebase.database.ServerValue.TIMESTAMP
    });
    msgInput.value = '';
  }
  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

  function listenForMessages() {
    const hiddenRef = db.ref(`chats/${chatRoomId}/hiddenFor/${myUsername}`);

    hiddenRef.once('value', (snapshot) => {
      const hiddenData = snapshot.val() || {};
      Object.keys(hiddenData).forEach((id) => hiddenIds.add(id));

      const messagesRef = db.ref(`chats/${chatRoomId}/messages`).limitToLast(100);

      messagesRef.on('child_added', (msgSnapshot) => {
        messageDataMap.set(msgSnapshot.key, msgSnapshot.val());
        if (!hiddenIds.has(msgSnapshot.key)) {
          renderMessage(msgSnapshot.key, msgSnapshot.val());
        }
      });

      messagesRef.on('child_changed', (msgSnapshot) => {
        messageDataMap.set(msgSnapshot.key, msgSnapshot.val());
        if (!hiddenIds.has(msgSnapshot.key)) {
          updateMessageRow(msgSnapshot.key, msgSnapshot.val());
        }
      });
    });

    // 监听"我隐藏了哪些消息"这个列表的变化，用于实现删除/清空功能
    // 用 child_added 而不是 value，这样每新增一条隐藏记录，只处理这一条，
    // 不需要重新渲染整个消息列表
    hiddenRef.on('child_added', (snapshot) => {
      const messageId = snapshot.key;
      hiddenIds.add(messageId);
      const row = messageRowMap.get(messageId);
      if (row) {
        row.remove();
        messageRowMap.delete(messageId);
      }
    });
  }

  function recallMessage(messageId) {
    if (!confirm('确定要撤回这条消息吗？')) return;
    db.ref(`chats/${chatRoomId}/messages/${messageId}`).update({
      recalled: true,
      text: ''
    });
  }

  // 删除：只隐藏在我自己这边，不影响数据库原始消息，对方完全无感知
  function deleteMessageForMe(messageId) {
    if (!confirm('删除这条消息？仅你自己看不到，对方仍能看到。')) return;
    db.ref(`chats/${chatRoomId}/hiddenFor/${myUsername}/${messageId}`).set(true);
  }

  // 清空记录：把当前已知的所有消息id都标记为"对我隐藏"，同样不影响对方
  function clearAllForMe() {
    if (!confirm('清空聊天记录？仅你自己这边会清空，对方依然能看到完整记录。')) return;
    const updates = {};
    messageDataMap.forEach((_, messageId) => {
      updates[`chats/${chatRoomId}/hiddenFor/${myUsername}/${messageId}`] = true;
    });
    if (Object.keys(updates).length === 0) return;
    db.ref().update(updates);
  }
  clearAllBtn.addEventListener('click', clearAllForMe);

  function renderMessage(messageId, msg) {
    const row = document.createElement('div');
    const isMine = msg.from === myUsername;
    row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
    row.dataset.messageId = messageId;

    messageRowMap.set(messageId, row);

    if (msg.recalled) {
      renderRecalledContent(row, msg, isMine);
    } else {
      renderNormalContent(row, messageId, msg, isMine);
    }

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function renderNormalContent(row, messageId, msg, isMine) {
    row.innerHTML = '';

    const name = document.createElement('div');
    name.className = 'msg-name';
    name.textContent = isMine ? '我' : msg.from;
    row.appendChild(name);

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = msg.text;
    wrap.appendChild(bubble);
    row.appendChild(wrap);

    // 任何消息都能右键/长按唤出菜单（用于删除），是否显示"撤回"由菜单点开后再判断
    const canRecall = isMine && (
      RECALL_TIME_LIMIT_MS === 0 ||
      (Date.now() - (msg.time || 0)) < RECALL_TIME_LIMIT_MS
    );
    bindContextMenuEvents(bubble, messageId, isMine, canRecall);
  }

  function bindContextMenuEvents(bubble, messageId, isMine, canRecall) {
    bubble.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      openContextMenu(e.clientX, e.clientY, messageId, canRecall);
    });

    bubble.addEventListener('touchstart', (e) => {
      bubble.classList.add('pressed');
      const touch = e.touches[0];
      longPressTimer = setTimeout(() => {
        openContextMenu(touch.clientX, touch.clientY, messageId, canRecall);
        bubble.classList.remove('pressed');
      }, LONG_PRESS_DURATION);
    }, { passive: true });

    bubble.addEventListener('touchmove', () => {
      clearTimeout(longPressTimer);
      bubble.classList.remove('pressed');
    }, { passive: true });

    bubble.addEventListener('touchend', () => {
      clearTimeout(longPressTimer);
      bubble.classList.remove('pressed');
    });
  }

  function openContextMenu(x, y, messageId, canRecall) {
    activeMessageId = messageId;
    recallMenuItem.style.display = canRecall ? 'block' : 'none';
    contextMenu.classList.add('active');

    const menuRect = contextMenu.getBoundingClientRect();
    const maxX = window.innerWidth - menuRect.width - 8;
    const maxY = window.innerHeight - menuRect.height - 8;

    contextMenu.style.left = Math.min(x, maxX) + 'px';
    contextMenu.style.top = Math.min(y, maxY) + 'px';
  }

  function closeContextMenu() {
    contextMenu.classList.remove('active');
    activeMessageId = null;
  }

  recallMenuItem.addEventListener('click', () => {
    if (activeMessageId) {
      recallMessage(activeMessageId);
    }
    closeContextMenu();
  });

  deleteMenuItem.addEventListener('click', () => {
    if (activeMessageId) {
      deleteMessageForMe(activeMessageId);
    }
    closeContextMenu();
  });

  document.addEventListener('click', (e) => {
    if (contextMenu.classList.contains('active') && !contextMenu.contains(e.target)) {
      closeContextMenu();
    }
  });
  document.addEventListener('touchstart', (e) => {
    if (contextMenu.classList.contains('active') && !contextMenu.contains(e.target)) {
      closeContextMenu();
    }
  });

  function renderRecalledContent(row, msg, isMine) {
    row.innerHTML = '';
    const placeholder = document.createElement('div');
    placeholder.className = 'recalled-msg';
    placeholder.textContent = isMine ? '你撤回了一条消息' : `${msg.from} 撤回了一条消息`;
    row.appendChild(placeholder);
  }

  function updateMessageRow(messageId, msg) {
    const row = messageRowMap.get(messageId);
    if (!row) return;
    const isMine = msg.from === myUsername;
    if (msg.recalled) {
      renderRecalledContent(row, msg, isMine);
    } else {
      renderNormalContent(row, messageId, msg, isMine);
    }
  }
</script>
</body>
</html>
