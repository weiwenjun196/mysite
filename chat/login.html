<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#90caf8,#64b5f6);
  font-family:Arial;
}

.login-box{
  width:320px;
  padding:40px;
  background:white;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

h2{
  margin-bottom:20px;
  color:#333;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
  transition:0.2s;
}

input:focus{
  border-color:#64b5f6;
  box-shadow:0 0 8px rgba(100,181,246,0.4);
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#64b5f6;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#42a5f5;
  transform:scale(1.03);
}

button:active{
  transform:scale(0.97);
}

.small{
  margin-top:10px;
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Chat Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

</div>

<script>
function login(){
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;

  if(!u || !p){
    alert("请输入用户名和密码");
    return;
  }

  window.location.href = "chat.html";
}
</script>

</body>
</html>
