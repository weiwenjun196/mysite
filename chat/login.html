<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
html, body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:Arial;
}
body{
  background:linear-gradient(135deg,#90caf8,#64b5f6);
  display:flex;
  justify-content:center;
  align-items:center;
}
.login-box{
  width:360px;
  padding:40px;
  background:white;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
  opacity:0;
  transform:translateY(20px) scale(0.98);
  animation:fadeInUp 0.8s ease forwards;
}
@keyframes fadeInUp{
  from{
    opacity:0;
    transform:translateY(25px) scale(0.98);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}
h2{
  margin-bottom:20px;
  color:#333;
}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
  transition:0.2s;
  box-sizing:border-box;
}
input:focus{
  border-color:#64b5f6;
  box-shadow:0 0 0 3px rgba(100,181,246,0.2);
}
.btn-row{
  display:flex;
  gap:12px;
  margin-top:18px;
}
button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#64b5f6;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}
button:hover{
  transform:scale(1.03);
}
button:disabled{
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
}
.back-btn{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:14px;
  background:#90caf8;
  color:white;
  text-decoration:none;
  font-size:16px;
  border-radius:8px;
  transition:0.2s;
}
.back-btn:hover{
  transform:scale(1.03);
}
button:active,
.back-btn:active{
  transform:scale(0.97);
}
.error-msg{
  color:#e53935;
  font-size:13px;
  margin-top:8px;
  min-height:18px;
}
.hint{
  font-size:12px;
  color:#999;
  margin-top:14px;
}
</style>
</head>
<body>
<div class="login-box">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="username" autocomplete="username">
  <input type="password" id="password" placeholder="password" autocomplete="current-password">
  <div class="error-msg" id="errorMsg"></div>
  <div class="btn-row">
    <a href="../explore.html" class="back-btn">返回主页</a>
    <button id="loginBtn" onclick="login()">Login</button>
  </div>
  <div class="hint">提示:聊天室使用Firebase 在中国大陆使用需开启VPN/代理</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  const EMAIL_DOMAIN = "@mysite.com";

  const errorMsg = document.getElementById('errorMsg');
  const loginBtn = document.getElementById('loginBtn');

  auth.onAuthStateChanged((user) => {
    if (user) {
      window.location.href = "contacts.html";
    }
  });

  function login(){
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    errorMsg.textContent = '';

    if(!u || !p){
      errorMsg.textContent = "请输入用户名和密码";
      return;
    }

    const email = u.includes('@') ? u : u + EMAIL_DOMAIN;

    loginBtn.disabled = true;
    loginBtn.textContent = "登录中...";

    auth.signInWithEmailAndPassword(email, p)
      .then(() => {
        // onAuthStateChanged 会自动处理跳转
      })
      .catch((error) => {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
        if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
          errorMsg.textContent = "用户名或密码错误";
        } else if (error.code === 'auth/too-many-requests') {
          errorMsg.textContent = "尝试次数过多，请稍后再试";
        } else {
          errorMsg.textContent = "登录失败: " + error.message;
        }
      });
  }

  // 支持按 Enter 登录
  document.getElementById('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
