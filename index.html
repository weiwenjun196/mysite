<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weiwenjun</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 10px 18px;
      margin: 5px;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn:hover {
      background: #2563eb;
    }

    .bg {
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, #3b82f6, transparent 40%),
                  radial-gradient(circle at 70% 70%, #8b5cf6, transparent 40%);
      animation: move 10s infinite alternate;
      z-index: -1;
      filter: blur(40px);
    }

    @keyframes move {
      from { transform: translate(-10%, -10%); }
      to { transform: translate(10%, 10%); }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="card">
    <h1>👋 Hello, I'm Weiwenjun</h1>
    <p>一个正在学习编程 & 构建有趣项目的人</p>

    <a class="btn" href="https://github.com/" target="_blank">GitHub</a>
    <a class="btn" href="mailto:example@email.com">Email</a>
    <a class="btn" href="#">Projects</a>
  </div>
</body>
</html>
