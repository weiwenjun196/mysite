<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>weiwenjun · 一些项目</title>
<link rel="icon" href="avatar.jpg" type="image/jpeg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

html, body{
  margin:0;
  height:100vh;
  overflow:hidden;
}
body{
  font-family:'Inter', Arial, sans-serif;
  color:#fbfcfe;
}
.section{
  position:fixed;
  left:0;
  top:0;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
  background:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,0.16), transparent 55%),
    linear-gradient(165deg, #5e93e8 0%, #6fa3ee 38%, #8cbcf2 75%, #aed0f5 100%);
}

/* Nav menu — left-side navigation, reusing the exact action-row style/interactions */
.nav-menu{
  position:fixed;
  top:26px;
  left:28px;
  z-index:3;
  width:200px;
  opacity:0;
  animation:fadeButton 0.8s ease forwards;
  animation-delay:0.45s;
}
.nav-action-list{
  display:flex;
  flex-direction:column;
  align-items:stretch;
  width:100%;
}
.nav-action-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 4px;
  border-top:1px solid rgba(255,255,255,0.22);
  text-decoration:none;
  color:#ffffff;
  transition:padding-left 0.3s ease, opacity 0.3s ease;
}
.nav-action-row:last-child{
  border-bottom:1px solid rgba(255,255,255,0.22);
}
.nav-action-row.is-link{
  cursor:pointer;
}
.nav-action-row.is-link:hover{
  padding-left:14px;
}
.nav-action-row.is-link:hover .nav-action-arrow{
  transform:translateX(4px);
  opacity:1;
}
.nav-action-row.is-disabled{
  color:rgba(255,255,255,0.5);
  cursor:default;
}
.nav-action-label{
  display:flex;
  align-items:baseline;
  gap:12px;
  font-family:'Inter', sans-serif;
  font-size:15px;
  font-weight:500;
  letter-spacing:0.2px;
}
.nav-action-num{
  font-family:'Source Serif 4', Georgia, serif;
  font-style:italic;
  font-size:12px;
  color:rgba(255,255,255,0.5);
}
.nav-action-status{
  font-size:11px;
  font-weight:500;
  letter-spacing:0.5px;
  color:rgba(255,255,255,0.45);
  text-transform:uppercase;
}
.nav-action-arrow{
  display:flex;
  opacity:0.75;
  transition:transform 0.3s ease, opacity 0.3s ease;
}
.nav-action-arrow svg{
  width:14px;
  height:14px;
}

.next-wrapper{
  display:flex;
  flex-direction:column;
  width:100%;
  height:100%;
  justify-content:center;
  align-items:center;
  padding:0 24px;
  box-sizing:border-box;
}
.next-eyebrow{
  font-family:'Inter', sans-serif;
  font-size:12px;
  font-weight:600;
  letter-spacing:3.5px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.62);
  margin-bottom:16px;
  opacity:0;
  animation:fadeUp 0.8s ease forwards;
  animation-delay:0.05s;
}
.next-title{
  font-family:'Source Serif 4', Georgia, serif;
  font-style:italic;
  font-weight:500;
  font-size:38px;
  color:#ffffff;
  margin:0 0 48px 0;
  opacity:0;
  animation:fadeUp 0.8s ease forwards;
  animation-delay:0.12s;
}
.next-divider{
  width:1px;
  height:48px;
  background:linear-gradient(to bottom, transparent, rgba(255,255,255,0.45), transparent);
  margin:0 0 44px 0;
  opacity:0;
  animation:fadeUp 0.8s ease forwards;
  animation-delay:0.18s;
}

.action-list{
  display:flex;
  flex-direction:column;
  align-items:stretch;
  width:100%;
  max-width:380px;
}
.action-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:22px 4px;
  border-top:1px solid rgba(255,255,255,0.22);
  text-decoration:none;
  color:#ffffff;
  opacity:0;
  animation:fadeUp 0.7s ease forwards;
  transition:padding-left 0.3s ease, opacity 0.3s ease;
}
.action-row:last-child{
  border-bottom:1px solid rgba(255,255,255,0.22);
}
.action-row.is-link{
  cursor:pointer;
}
.action-row.is-link:hover{
  padding-left:14px;
}
.action-row.is-link:hover .action-arrow{
  transform:translateX(4px);
  opacity:1;
}
.action-row.is-disabled{
  color:rgba(255,255,255,0.5);
  cursor:default;
}
.action-label{
  display:flex;
  align-items:baseline;
  gap:14px;
  font-family:'Inter', sans-serif;
  font-size:18px;
  font-weight:500;
  letter-spacing:0.2px;
}
.action-num{
  font-family:'Source Serif 4', Georgia, serif;
  font-style:italic;
  font-size:14px;
  color:rgba(255,255,255,0.5);
}
.action-status{
  font-size:12px;
  font-weight:500;
  letter-spacing:0.5px;
  color:rgba(255,255,255,0.45);
  text-transform:uppercase;
}
.action-arrow{
  display:flex;
  opacity:0.75;
  transition:transform 0.3s ease, opacity 0.3s ease;
}
.action-arrow svg{
  width:16px;
  height:16px;
}

.row-1{ animation-delay:0.26s; }
.row-2{ animation-delay:0.34s; }

@keyframes fadeButton{
  from{ opacity:0; transform:translateY(15px); }
  to{ opacity:1; transform:translateY(0); }
}
@keyframes fadeUp{
  from{ opacity:0; transform:translateY(20px); }
  to{ opacity:1; transform:translateY(0); }
}

@media (max-width:480px){
  .next-title{ font-size:30px; }
  .action-label{ font-size:16px; }
  .nav-menu{ top:18px; left:18px; width:168px; }
  .nav-action-label{ font-size:14px; }
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
}
</style>
</head>
<body>

<div class="section">
  <nav class="nav-menu">
    <div class="nav-action-list">
      <a href="index.html" class="nav-action-row is-link">
        <span class="nav-action-label">
          <span class="nav-action-num">01</span>
          主页
        </span>
        <span class="nav-action-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </span>
      </a>
      <div class="nav-action-row is-disabled">
        <span class="nav-action-label">
          <span class="nav-action-num">02</span>
          一些项目
        </span>
        <span class="nav-action-status">当前</span>
      </div>
    </div>
  </nav>

  <div class="next-wrapper">
    <span class="next-eyebrow">Explore</span>
    <h1 class="next-title">一些好玩的</h1>
    <div class="next-divider"></div>
    <div class="action-list">
      <a href="chat/login.html" class="action-row is-link row-1">
        <span class="action-label">
          <span class="action-num">01</span>
          聊天室
        </span>
        <span class="action-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </span>
      </a>
      <div class="action-row is-disabled row-2">
        <span class="action-label">
          <span class="action-num">02</span>
          更多功能
        </span>
        <span class="action-status">敬请期待</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
