<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>聊天室</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100vh; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg,#90caf8,#64b5f6);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 85vh;
  }
  .header {
    background: #64b5f6;
    color: white;
    padding: 14px 16px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header .status { font-size: 12px; opacity: 0.85; font-weight: normal; }
  .logout-btn {
    background: rgba(255,255,255,0.25);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.4); }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg-row { display: flex; flex-direction: column; max-width: 75%; }
  .msg-row.mine { align-self: flex-end; align-items: flex-end; }
  .msg-row.theirs { align-self: flex-start; align-items: flex-start; }
  .msg-name { font-size: 12px; color: #888; margin-bottom: 2px; padding: 0 4px; }
  .bubble {
    padding: 8px 12px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
  }
  .mine .bubble { background: #64b5f6; color: white; border-bottom-right-radius: 4px; }
  .theirs .bubble { background: #f0f0f0; color: #222; border-bottom-left-radius: 4px; }
  .input-bar {
    display: flex;
    padding: 12px;
    border-top: 1px solid #eee;
    gap: 8px;
  }
  .input-bar input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 20px;
    font-size: 14px;
    outline: none;
  }
  .input-bar button {
    background: #64b5f6;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 0 18px;
    cursor: pointer;
    font-size: 14px;
  }
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #888;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <span id="headerTitle">聊天室</span>
    <div style="display:flex; align-items:center; gap:10px;">
      <span class="status" id="statusText"></span>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </div>
  <div id="loadingScreen" class="loading-screen">加载中...</div>
  <div class="messages" id="messages" style="display:none;"></div>
  <div class="input-bar" id="inputBar" style="display:none;">
    <input type="text" id="msgInput" placeholder="输入消息..." />
    <button id="sendBtn">发送</button>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  // ===== 这里定义固定的两个聊天用户 =====
  // 把邮箱前缀（@ 之前的部分）作为显示名。需要和你在 Firebase
  // 控制台创建账号时使用的邮箱对应。
  const CHAT_PAIR = ["bob", "alice"]; // 按需改成你实际创建的两个用户名

  const messagesEl = document.getElementById('messages');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const loadingScreen = document.getElementById('loadingScreen');
  const inputBar = document.getElementById('inputBar');
  const headerTitle = document.getElementById('headerTitle');
  const statusText = document.getElementById('statusText');

  let myUsername = '';
  let otherUsername = '';
  let chatRoomId = '';

  // 检查登录状态
  auth.onAuthStateChanged((user) => {
    if (!user) {
      // 未登录，踢回登录页
      window.location.href = "login.html";
      return;
    }

    // 从邮箱里提取用户名（去掉 @域名 部分）
    myUsername = user.email.split('@')[0];

    if (!CHAT_PAIR.includes(myUsername)) {
      loadingScreen.textContent = "当前账号未配置聊天权限";
      return;
    }

    otherUsername = CHAT_PAIR.find(name => name !== myUsername);
    headerTitle.textContent = `与 ${otherUsername} 聊天中`;
    statusText.textContent = `我是 ${myUsername}`;

    // 生成两人共用、且唯一的聊天室ID（按字母排序拼接，确保双方算出来的ID一致）
    chatRoomId = CHAT_PAIR.slice().sort().join('_');

    loadingScreen.style.display = 'none';
    messagesEl.style.display = 'flex';
    inputBar.style.display = 'flex';
    msgInput.focus();

    listenForMessages();
  });

  function logout() {
    auth.signOut().then(() => {
      window.location.href = "login.html";
    });
  }

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !chatRoomId) return;
    db.ref(`chats/${chatRoomId}/messages`).push({
      from: myUsername,
      text: text,
      time: firebase.database.ServerValue.TIMESTAMP
    });
    msgInput.value = '';
  }
  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

  function listenForMessages() {
    db.ref(`chats/${chatRoomId}/messages`).limitToLast(100).on('child_added', (snapshot) => {
      renderMessage(snapshot.val());
    });
  }

  function renderMessage(msg) {
    const row = document.createElement('div');
    const isMine = msg.from === myUsername;
    row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');

    const name = document.createElement('div');
    name.className = 'msg-name';
    name.textContent = isMine ? '我' : msg.from;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = msg.text;

    row.appendChild(name);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>
</body>
</html>
