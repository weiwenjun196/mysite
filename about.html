<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>About me</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap');

html, body{
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Inter', Arial, sans-serif;
  overflow: hidden;
  background-color: #0d1620;
  color: #fbfcfe;
}
body{
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  box-sizing: border-box;
}

body::before{
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url("background.png") no-repeat center center;
  background-size: cover;
  background-color: #11161d;
  z-index: 0;
  animation: bgFadeIn 1.1s ease-out forwards;
}
body::after{
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(ellipse 75% 65% at 50% 50%, transparent 35%, rgba(8,11,16,0.22) 100%),
    linear-gradient(180deg, rgba(8,11,16,0.20) 0%, transparent 18%, transparent 75%, rgba(8,11,16,0.30) 100%);
  z-index: 1;
}

.back-row{
  margin-top: 36px;
  padding-top: 22px;
  border-top: 1px solid rgba(255,255,255,0.12);
  opacity: 0;
  animation: fadeUp .8s .85s forwards;
}
.back-btn{
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-style: italic;
  color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.22);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
  text-decoration: none;
  border-radius: 30px;
  transition: all 0.3s ease;
}
.back-btn:hover{
  color: #ffffff;
  background: rgba(255,255,255,0.13);
  border-color: rgba(255,255,255,0.45);
  transform: translateX(-2px);
}
.back-btn svg{
  width: 16px;
  height: 16px;
}

.container{
  width: 860px;
  max-width: 92%;
  position: relative;
  z-index: 2;
  background: rgba(0,0,0,0.6);
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  padding: 46px 50px;
  box-sizing: border-box;
  animation: fadeIn 0.9s ease-out forwards;
}
.content-cols{
  display: flex;
  gap: 48px;
}
.col-left{
  flex: 1.1;
}
.col-right{
  flex: 1;
}

.eyebrow{
  display: block;
  font-style: italic;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin-bottom: 14px;
  opacity: 0;
  animation: fadeUp .8s .1s forwards;
}
h1{
  font-family: 'Noto Serif SC', Georgia, serif;
  font-style: italic;
  font-weight: 500;
  font-size: 36px;
  letter-spacing: 1px;
  margin: 0 0 32px 0;
  padding-bottom: 22px;
  border-bottom: 1px solid rgba(255,255,255,0.16);
  color: #ffffff;
  opacity: 0;
  animation: fadeUp .8s .25s forwards;
}

.section{
  margin-bottom: 30px;
  opacity: 0;
  animation: fadeUp .8s forwards;
}
.section:last-of-type{ margin-bottom: 0; }
.delay-1{ animation-delay: .4s; }

.intro-text{
  font-style: italic;
  font-size: 16px;
  line-height: 1.85;
  color: rgba(251,252,254,0.95);
}

h2{
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-family: 'Inter', sans-serif;
  font-style: italic;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin: 0 0 16px 0;
}
h2::after{
  content: "";
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.14);
}

.info-list{
  display: flex;
  flex-direction: column;
}
.info-row{
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  padding: 13px 2px;
  border-top: 1px solid rgba(255,255,255,0.10);
  font-size: 15px;
}
.info-row:last-child{
  border-bottom: 1px solid rgba(255,255,255,0.10);
}
.info-label{
  font-style: italic;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.info-value{
  font-style: italic;
  color: #ffffff;
  font-weight: 500;
  text-align: right;
}

@keyframes bgFadeIn{
  from{ opacity: 0.6; filter: blur(3px); transform: scale(1.01); }
  to{ opacity: 1; filter: blur(0px); transform: scale(1); }
}
@keyframes fadeIn{
  from{ opacity: 0; transform: scale(0.98); }
  to{ opacity: 1; transform: scale(1); }
}
@keyframes fadeUp{
  from{ opacity: 0; transform: translateY(20px); }
  to{ opacity: 1; transform: translateY(0); }
}

@media (max-width: 640px){
  .content-cols{ flex-direction: column; gap: 0; }
}
@media (max-width: 480px){
  body{ padding: 0 16px; }
  .container{ padding: 36px 26px; }
  h1{ font-size: 28px; margin-bottom: 26px; padding-bottom: 18px; }
  .back-btn{ padding: 8px 16px; font-size: 12px; }
  .info-row{ font-size: 14px; }
}
@media (prefers-reduced-motion: reduce){
  *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="container">
  <span class="eyebrow">SELF-INTRODUCTION</span>
  <h1>About Me</h1>

  <div class="content-cols">
    <div class="col-left">
      <div class="section delay-1">
        <p class="intro-text">
          Hi，我是 weiwenjun<br>
          一名中国大陆中学生<br>
          喜欢编程、设计和折腾网页<br>
          可以做朋友吗
        </p>
      </div>
    </div>

    <div class="col-right">
      <div class="section delay-1">
        <h2>基本信息</h2>
        <div class="info-list">
          <div class="info-row">
            <span class="info-label">年龄</span>
            <span class="info-value">15</span>
          </div>
          <div class="info-row">
            <span class="info-label">学历</span>
            <span class="info-value">初二在读</span>
          </div>
          <div class="info-row">
            <span class="info-label">爱好</span>
            <span class="info-value">写代码 / 游戏 / 动漫</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="back-row">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      返回
    </a>
  </div>
</div>

</body>
</html>
