<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>About me</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap');

html, body{
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Inter', Arial, sans-serif;
  overflow: hidden;
  background-color: #0d1620;
  color: #fbfcfe;
}
body{
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  box-sizing: border-box;
}

.bg-layer{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background-color: #11161d;
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  opacity: 0;
  filter: blur(6px) saturate(0.9);
  transform: scale(1.03);
  transition: opacity 1.8s cubic-bezier(0.22, 0.61, 0.36, 1),
              filter 1.8s cubic-bezier(0.22, 0.61, 0.36, 1),
              transform 1.8s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.bg-layer.is-visible{
  opacity: 1;
  filter: blur(0px) saturate(1);
  transform: scale(1);
}
body::after{
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(ellipse 75% 65% at 50% 50%, transparent 35%, rgba(8,11,16,0.22) 100%),
    linear-gradient(180deg, rgba(8,11,16,0.20) 0%, transparent 18%, transparent 75%, rgba(8,11,16,0.30) 100%);
  z-index: 1;
}

.container,
.eyebrow,
h1,
.social-links,
.section,
.back-row{
  opacity: 0;
}
body.assets-ready .container{ animation: fadeIn 1.4s cubic-bezier(0.22, 0.61, 0.36, 1) .35s forwards; }
body.assets-ready .eyebrow{ animation: fadeUp 1s ease .5s forwards; }
body.assets-ready h1{ animation: fadeUp 1s ease .62s forwards; }
body.assets-ready .section{ animation: fadeUp 1s ease forwards; }
body.assets-ready .delay-1{ animation-delay: .76s; }
body.assets-ready .social-links{ animation: fadeUp 1s ease 1.05s forwards; }
body.assets-ready .back-row{ animation: fadeUp 1s ease 1.05s forwards; }

.loader{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  background: #0d1620;
  opacity: 1;
  transition: opacity 1.1s cubic-bezier(0.4, 0, 0.2, 1) .15s,
              visibility 1.1s linear .15s;
}
body.assets-ready .loader{
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.loader-mark{
  position: relative;
  width: 64px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.loader-mark svg{
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.loader-mark circle{
  fill: none;
  stroke-linecap: round;
}
.loader-track{
  stroke: rgba(255,255,255,0.10);
  stroke-width: 1;
}
.loader-arc{
  stroke: rgba(255,255,255,0.55);
  stroke-width: 1;
  stroke-dasharray: 168;
  stroke-dashoffset: 168;
  animation: draw-arc 1.8s cubic-bezier(0.65, 0, 0.35, 1) infinite;
}

.loader-caption{
  display: flex;
  align-items: center;
  gap: 7px;
  font-style: italic;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.32);
}
.loader-caption .dot{
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,0.32);
  animation: dot-pulse 1.4s ease-in-out infinite;
}
.loader-caption .dot:nth-child(2){ animation-delay: 0.2s; }
.loader-caption .dot:nth-child(3){ animation-delay: 0.4s; }

@keyframes draw-arc{
  0%{ stroke-dashoffset: 168; opacity: 0.3; }
  50%{ stroke-dashoffset: 20; opacity: 1; }
  100%{ stroke-dashoffset: 168; opacity: 0.3; }
}

@keyframes dot-pulse{
  0%, 100%{ opacity: 0.25; transform: scale(0.85); }
  50%{ opacity: 0.85; transform: scale(1); }
}

.back-row{
  margin-top: 36px;
  padding-top: 22px;
  border-top: 1px solid rgba(255,255,255,0.12);
}
.back-btn{
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-style: italic;
  color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.22);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
  text-decoration: none;
  border-radius: 30px;
  transition: all 0.3s ease;
}
.back-btn:hover{
  color: #ffffff;
  background: rgba(255,255,255,0.13);
  border-color: rgba(255,255,255,0.45);
  transform: translateX(-2px);
}
.back-btn svg{
  width: 16px;
  height: 16px;
}

.container{
  width: 860px;
  max-width: 92%;
  position: relative;
  z-index: 2;
  background: rgba(0,0,0,0.6);
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  padding: 46px 50px;
  box-sizing: border-box;
}
.content-cols{
  display: flex;
  gap: 48px;
}
.col-left{
  flex: 1.1;
}
.col-right{
  flex: 1;
}

.eyebrow{
  display: block;
  font-style: italic;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin-bottom: 14px;
}
h1{
  font-family: 'Noto Serif SC', Georgia, serif;
  font-style: italic;
  font-weight: 500;
  font-size: 36px;
  letter-spacing: 1px;
  margin: 0 0 32px 0;
  padding-bottom: 22px;
  border-bottom: 1px solid rgba(255,255,255,0.16);
  color: #ffffff;
}

.section{
  margin-bottom: 30px;
}
.section:last-of-type{ margin-bottom: 0; }

.intro-text{
  font-style: italic;
  font-size: 16px;
  line-height: 1.85;
  color: rgba(251,252,254,0.95);
}

h2{
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-family: 'Inter', sans-serif;
  font-style: italic;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin: 0 0 16px 0;
}
h2::after{
  content: "";
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.14);
}

.info-list{
  display: flex;
  flex-direction: column;
}
.info-row{
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  padding: 13px 2px;
  border-top: 1px solid rgba(255,255,255,0.10);
  font-size: 15px;
}
.info-row:last-child{
  border-bottom: 1px solid rgba(255,255,255,0.10);
}
.info-label{
  font-style: italic;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.info-value{
  font-style: italic;
  color: #ffffff;
  font-weight: 500;
  text-align: right;
}

.social-links{
  display: flex;
  gap: 12px;
  margin-top: 18px;
}

.social-btn{
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.8);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: 0.25s ease;
}

.social-btn:hover{
  transform: translateY(-2px) scale(1.05);
  background: rgba(255,255,255,0.12);
  color: #fff;
  border-color: rgba(255,255,255,0.35);
}

.social-btn svg{
  width: 20px;
  height: 20px;
}

@keyframes fadeIn{
  from{ opacity: 0; transform: scale(0.98); }
  to{ opacity: 1; transform: scale(1); }
}
@keyframes fadeUp{
  from{ opacity: 0; transform: translateY(20px); }
  to{ opacity: 1; transform: translateY(0); }
}

@media (max-width: 640px){
  .content-cols{ flex-direction: column; gap: 0; }
}
@media (max-width: 480px){
  body{ padding: 0 16px; }
  .container{ padding: 36px 26px; }
  h1{ font-size: 28px; margin-bottom: 26px; padding-bottom: 18px; }
  .back-btn{ padding: 8px 16px; font-size: 12px; }
  .info-row{ font-size: 14px; }
}
@media (prefers-reduced-motion: reduce){
  *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  .loader-arc{ animation: none; stroke-dashoffset: 60; opacity: 0.8; }
  .loader-caption .dot{ animation: none; opacity: 0.6; }
}
</style>
</head>

<script>
(function(){
  var bgUrl = "background.png";
  var bgLayer = document.getElementById('bgLayer');
  var img = new Image();

  function reveal(){
    bgLayer.style.backgroundImage = "url('" + bgUrl + "')";
    bgLayer.classList.add('is-visible');
    document.body.classList.add('assets-ready');
  }

  img.onload = reveal;
  img.onerror = reveal;
  img.src = bgUrl;

  setTimeout(function(){
    if (!document.body.classList.contains('assets-ready')) reveal();
  }, 6000);
})();
</script>

</body>
</html>
