<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>About me</title>

<style>
html, body{
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

body{
  display: flex;
  justify-content: center;
  align-items: center;
}

.container{
  width: 800px;
  max-width: 90%;

  background: rgba(0,0,0,0.6);
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);

  color: #fff;

  animation: fadeIn 0.8s ease-out forwards;
}

h1{
  border-left: 4px solid #4fc3f7;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  padding-left: 10px;
  padding-bottom: 10px;
  font-size: 32px;
  margin-bottom: 25px;

  opacity: 0;
  animation: fadeUp .8s .2s forwards;
}

.section{
  margin-bottom: 20px;
  line-height: 1.6;

  opacity: 0;
  animation: fadeUp .8s forwards;
}

.section:nth-of-type(1){ animation-delay: .4s; }
.section:nth-of-type(2){ animation-delay: .6s; }
.section:nth-of-type(3){ animation-delay: .8s; }
.section:nth-of-type(4){ animation-delay: 1s; }

h2{
  border-left: 4px solid #4fc3f7;
  padding-left: 10px;
  font-size: 18px;
}

a{
  color: #4fc3f7;
  text-decoration: none;
}

a:hover{
  text-decoration: underline;
}

body::before{
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url("background.png") no-repeat center center;
  background-size: cover;

  z-index: -1;

  background-color: #000;
  backface-visibility: hidden;
  transform: translateZ(0);

  animation: bgFadeIn 1s ease-out forwards;
  will-change: opacity, filter;
}

@keyframes bgFadeIn{
  from{
    opacity: 0.6;
    filter: blur(3px);
    transform: scale(1.01);
  }
  to{
    opacity: 1;
    filter: blur(0px);
    transform: scale(1);
  }
}

@keyframes fadeIn{
  from{
    opacity: 0;
    transform: scale(0.98);
  }
  to{
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes fadeUp{
  from{
    opacity: 0;
    transform: translateY(20px);
  }
  to{
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<div class="container">

  <h1>About Me</h1>

  <div class="section">
    Hi，我是 weiwenjun<br>
    一名中国大陆中学生<br>
    喜欢编程、设计和折腾网页<br>
  </div>

  <div class="section">
    <h2>基本信息</h2>
    - 年龄：15<br>
    - 学历：初三在读<br>
    - 爱好：写代码 / 游戏<br>
  </div>

  <div class="section">
    <h2>自我介绍</h2>
    emm 没什么想说的<br>
  </div>

  <div class="section">
    <a href="index.html">← 返回主页</a>
  </div>

</div>

</body>
</html>
