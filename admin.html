<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin 控制面板 — mysite</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,\"Helvetica Neue\",Arial;max-width:980px;margin:24px auto;padding:0 16px;color:#111}
    header{display:flex;align-items:center;gap:12px}
    h1{margin:0;font-size:20px}
    .row{display:flex;gap:8px;align-items:center;margin:12px 0}
    input[type=password]{padding:8px;border:1px solid #ddd;border-radius:6px;width:360px}
    button{padding:8px 12px;border-radius:6px;border:1px solid #1976d2;background:#1976d2;color:#fff;cursor:pointer}
    select{padding:8px;border-radius:6px;border:1px solid #ddd}
    textarea{width:100%;height:420px;padding:12px;border-radius:6px;border:1px solid #ddd;font-family:monospace;white-space:pre-wrap}
    .info{margin:8px 0;color:#555}
    .success{color:green}
    .error{color:#b00020}
    footer{margin-top:18px;color:#666;font-size:13px}
  </style>
</head>
<body>
  <header>
    <h1>Admin 控制面板</h1>
    <div style="font-size:13px;color:#666">仓库: <strong>weiwenjun196/mysite</strong></div>
  </header>

  <p class="info">说明：这是一个基于 GitHub REST API 的简单管理界面。你需要输入一个具有写权限的 GitHub 个人访问令牌（PAT，scopes: repo 或 public_repo），以便编辑并提交仓库文件。把令牌粘贴到下面（仅在本地使用，不要泄露）。</p>

  <div class="row">
    <input id="token" type="password" placeholder="请输入 GitHub Personal Access Token (PAT)" />
    <button id="load">加载文件列表</button>
    <button id="listRoot">列出根目录</button>
  </div>

  <div class="row">
    <label for="files">选择文件：</label>
    <select id="files"><option value="">-- 先加载文件 --</option></select>
    <button id="edit">编辑</button>
    <button id="new">新建文件</button>
  </div>

  <div id="editor" style="display:none">
    <div class="row"><input id="filename" placeholder="文件路径（例如 index.html 或 docs/about.md）" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px" /></div>
    <textarea id="content" placeholder="文件内容..."></textarea>
    <div class="row">
      <button id="save">保存并提交</button>
      <button id="cancel">取消</button>
      <div id="status" style="margin-left:12px"></div>
    </div>
  </div>

  <footer>
    注意：在浏览器中使用 PAT 有泄露风险。更安全的方式是在受信任的后端服务中托管编辑功能。此界面仅作为快速管理工具。
  </footer>

  <script>
    const OWNER = 'weiwenjun196';
    const REPO = 'mysite';
    const apiBase = `https://api.github.com/repos/${OWNER}/${REPO}`;

    const $ = id => document.getElementById(id);
    const tokenInput = $('token');
    const filesSelect = $('files');
    const editor = $('editor');
    const filenameInput = $('filename');
    const contentArea = $('content');
    const status = $('status');

    function showStatus(msg, cls){ status.textContent = msg; status.className = cls || ''; }

    function utf8_to_b64(str){ return btoa(unescape(encodeURIComponent(str))); }
    function b64_to_utf8(str){ return decodeURIComponent(escape(atob(str))); }

    async function apiFetch(path, opts={}){
      const headers = opts.headers || {};
      const token = tokenInput.value.trim();
      if(token) headers['Authorization']=`token ${token}`;
      headers['Accept']='application/vnd.github.v3+json';
      const res = await fetch(apiBase + path, {...opts, headers});
      if(!res.ok){ const txt = await res.text(); throw new Error(`${res.status} ${res.statusText}: ${txt}`); }
      return res.json();
    }

    async function listRoot(){
      try{
        filesSelect.innerHTML = '<option>加载中…</option>';
        const data = await apiFetch('/contents');
        filesSelect.innerHTML = '';
        data.forEach(item=>{
          if(item.type === 'file'){
            const opt = document.createElement('option'); opt.value = item.path; opt.textContent = item.path; filesSelect.appendChild(opt);
          }
          if(item.type === 'dir'){
            // optional: mark directories
            const opt = document.createElement('option'); opt.value = item.path; opt.textContent = item.path + '/ (目录)'; filesSelect.appendChild(opt);
          }
        });
        showStatus('已加载根目录', 'success');
      }catch(e){ filesSelect.innerHTML = '<option>加载失败</option>'; showStatus(e.message, 'error'); }
    }

    async function loadFile(path){
      try{
        showStatus('正在获取文件…');
        const data = await apiFetch(`/contents/${encodeURIComponent(path)}`);
        const raw = data.content.replace(/\n/g,'');
        const text = b64_to_utf8(raw);
        filenameInput.value = data.path;
        contentArea.value = text;
        editor.dataset.sha = data.sha;
        editor.style.display = 'block';
        showStatus('已加载 ' + data.path, 'success');
      }catch(e){ showStatus(e.message, 'error'); }
    }

    async function saveFile(){
      const path = filenameInput.value.trim();
      if(!path){ showStatus('请填写文件路径', 'error'); return; }
      const content = contentArea.value;
      const b64 = utf8_to_b64(content);
      const sha = editor.dataset.sha; // may be undefined for new file
      const body = { message: `Admin: update ${path}`, content: b64 };
      if(sha) body.sha = sha;

      try{
        showStatus('正在提交…');
        const headers = { 'Authorization': `token ${tokenInput.value.trim()}`, 'Accept': 'application/vnd.github.v3+json' };
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${encodeURIComponent(path)}`, {
          method: 'PUT', headers, body: JSON.stringify(body)
        });
        const json = await res.json();
        if(!res.ok) throw new Error(JSON.stringify(json));
        editor.dataset.sha = json.content.sha;
        showStatus('提交成功: ' + json.commit.html_url, 'success');
        // refresh list
        await listRoot();
      }catch(e){ showStatus(e.message, 'error'); }
    }

    $('load').addEventListener('click', ()=>{ listRoot(); });
    $('listRoot').addEventListener('click', ()=>{ listRoot(); });
    $('edit').addEventListener('click', ()=>{
      const v = filesSelect.value;
      if(!v){ showStatus('请先选择一个文件', 'error'); return; }
      // if chosen item ends with '/ (目录)', ignore
      if(v.endsWith('/ (目录)')){ showStatus('请选择文件而非目录', 'error'); return; }
      loadFile(v);
    });
    $('new').addEventListener('click', ()=>{
      editor.style.display = 'block'; filenameInput.value = 'new-file.txt'; contentArea.value = '';
      delete editor.dataset.sha; showStatus('创建新文件，填写路径后保存');
    });
    $('save').addEventListener('click', ()=>{ saveFile(); });
    $('cancel').addEventListener('click', ()=>{ editor.style.display='none'; showStatus('已取消'); });

    // on load try to populate some known editable pages
    (async ()=>{
      // add common files
      const known = ['index.html','about.html','README.md'];
      known.forEach(k=>{ const opt=document.createElement('option'); opt.value=k; opt.textContent=k; filesSelect.appendChild(opt); });
    })();
  </script>
</body>
</html>
